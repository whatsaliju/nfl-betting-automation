name: 6. Grade Week Results

on:
  workflow_dispatch:
    inputs:
      week:
        description: "NFL Week Number"
        required: true
        type: number
      season:
        description: "NFL season"
        required: false
        default: "2026"
        type: string
      season_type:
        description: "Season type (REG or POST)"
        required: false
        default: "REG"
        type: string

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install pandas requests

      - name: Grade Week
        run: |
          python3 graders/grade_week_results.py \
            --season ${{ github.event.inputs.season }} \
            --week ${{ github.event.inputs.week }} \
            --season-type ${{ github.event.inputs.season_type }}

      - name: Refresh Week Master and Matrix Feed
        run: |
          python3 builders/build_week_master_table.py \
            --season ${{ github.event.inputs.season }} \
            --week ${{ github.event.inputs.week }} \
            --season-type ${{ github.event.inputs.season_type }}
          python3 builders/build_matrix_engine_feed.py
          python3 builders/build_game_feature_table.py
          python3 scripts/audit_game_features.py
          python3 scripts/generate_feature_research_report.py \
            --features data/historical/game_features.csv \
            --audit data/historical/game_feature_audit.csv \
            --json-output data/historical/feature_research_report.json \
            --md-output data/historical/feature_research_report.md
          if [ -f data/backtests/engine_2026_1_configured/game_features.csv ]; then
            python3 scripts/build_model_training_dataset.py
            python3 scripts/evaluate_factor_promotion.py
            python3 scripts/simulate_promotion_overlays.py
            python3 scripts/audit_source_reliability.py
            python3 scripts/build_pick_explanations.py \
              --features data/backtests/engine_2026_1_configured/game_features.csv \
              --json-output data/backtests/engine_2026_1_configured/pick_explanations.json \
              --csv-output data/backtests/engine_2026_1_configured/pick_explanations.csv \
              --md-output data/backtests/engine_2026_1_configured/pick_explanations.md
          fi
          python3 scripts/build_pick_explanations.py
          python3 builders/build_matrix_engine_feed.py

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical/
          git commit -m "📊 Grade Week ${{ github.event.inputs.week }} results" || exit 0
          git push
