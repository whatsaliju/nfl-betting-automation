name: 2. Initial Market Data

on:
  repository_dispatch:
    types: [referee-data-ready]
  workflow_dispatch:
    inputs:
      week:
        description: 'NFL Week/Round (1-18, WC, DIV, CONF, SB)'
        required: true
        type: string
      season:
        description: 'NFL season'
        required: false
        default: '2026'
        type: string

jobs:
  collect_initial_market:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
      
      - name: Pull latest changes
        run: git pull origin main
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Python Dependencies
        run: pip install pandas selenium lxml
      
      - name: Install Google Chrome and ChromeDriver for Scraping
        uses: browser-actions/setup-chrome@latest
        with:
          # Installs the stable version of Chrome/Chromium, bypassing the unreliable apt/snap package
          chrome-version: 'stable' 
          # Automatically installs all required Linux libraries (e.g., libnss3)
          install-dependencies: true
          # Automatically installs the compatible ChromeDriver executable
          install-chromedriver: true 
      
      - name: Get Week Number
        id: get_week
        run: |
          SEASON="${{ github.event.inputs.season }}"
          [ -z "$SEASON" ] && SEASON="${{ github.event.client_payload.season }}"
          [ -z "$SEASON" ] && SEASON="${{ vars.NFL_SEASON }}"
          [ -z "$SEASON" ] && SEASON="2026"
          if [ -n "${{ github.event.inputs.week }}" ]; then
            WEEK=${{ github.event.inputs.week }}
          elif [ -n "${{ github.event.client_payload.week }}" ]; then
            WEEK=${{ github.event.client_payload.week }}
          else
            # Detect from existing files
            WEEK=$(ls data/week*/week*_referees.csv 2>/dev/null | grep -oP 'week\K[0-9]+' | sort -n | tail -1)
          fi
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "season=$SEASON" >> $GITHUB_OUTPUT
          echo "­¤ōģ Collecting initial market data for Week $WEEK"
          echo "­¤Åł NFL Season: $SEASON"
      
      - name: Create config folder
        run: mkdir -p config
  
      - name: Create Action Network Cookies
        env:
          COOKIES: ${{ secrets.ACTION_NETWORK_COOKIES }}
        run: echo "$COOKIES" > config/action_network_cookies.json
      
      - name: Scrape Action Network (All Markets)
        run: |
          echo "­¤ōŖ Scraping Action Network..."
          python3 scrapers/action_network_scraper_cookies.py ${{ steps.get_week.outputs.week }}
      
      - name: Scrape Action Network Injuries & Weather
        run: |
          echo "­¤®╣ Scraping Action Network injuries & weather..."
          python3 scrapers/action_network_injuries_weather.py

      - name: Capture Generated Input Files
        id: generated_files
        run: |
          latest_file() {
            python3 -c 'import glob, os, sys; files=[]; [files.extend(glob.glob(p)) for p in sys.argv[1:]]; files.sort(key=os.path.getmtime, reverse=True); print(files[0] if files else "")' "$@"
          }

          ACTION_MARKETS_FILE=$(latest_file "data/action_all_markets_*.csv")
          ACTION_INJURIES_FILE=$(latest_file "data/action_injuries_*.csv")
          ACTION_WEATHER_FILE=$(latest_file "data/action_weather_*.csv")
          echo "action_markets_file=$ACTION_MARKETS_FILE" >> $GITHUB_OUTPUT
          echo "action_injuries_file=$ACTION_INJURIES_FILE" >> $GITHUB_OUTPUT
          echo "action_weather_file=$ACTION_WEATHER_FILE" >> $GITHUB_OUTPUT
          echo "Markets: $ACTION_MARKETS_FILE"
          echo "Injuries: $ACTION_INJURIES_FILE"
          echo "Weather: $ACTION_WEATHER_FILE"
      
      - name: Commit Market Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/action_all_markets_*.csv \
                  data/action_injuries_*.csv \
                  data/action_weather_*.csv || true
          
          # 1. Commit changes
          git commit -m "­¤ōŖ Week ${{ steps.get_week.outputs.week }} initial market data" || echo "No changes to commit"
          
          # 2. FIX: Pull remote changes and reapply your commit cleanly
          git pull --rebase origin main
          
          # 3. Push the resulting changes
          git push
      
      - name: Trigger Pro Analysis
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: initial-market-data
          client-payload: '{"week": "${{ steps.get_week.outputs.week }}", "season": "${{ steps.get_week.outputs.season }}", "analysis_type": "initial", "action_markets_file": "${{ steps.generated_files.outputs.action_markets_file }}", "action_injuries_file": "${{ steps.generated_files.outputs.action_injuries_file }}", "action_weather_file": "${{ steps.generated_files.outputs.action_weather_file }}"}'
      
      - name: Summary
        run: |
          echo "Ō£ģ Initial market data collection complete"
          echo "­¤ōü Market files created:"
          ls -lh data/action_all_markets_*.csv data/action_injuries_*.csv data/action_weather_*.csv 2>/dev/null || true
