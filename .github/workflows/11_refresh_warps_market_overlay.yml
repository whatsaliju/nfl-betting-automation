name: 11 Refresh WARPS Market Overlay

on:
  schedule:
    # Daily during the NFL betting calendar. Times are UTC.
    - cron: "15 13 * 8-12,1-2 *"
  workflow_dispatch:
    inputs:
      fair_line_only:
        description: "Rebuild without current odds"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      preferred_book:
        description: "Optional Odds API bookmaker key/title preference"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh-warps-market-overlay:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh overlay
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FAIR_LINE_ONLY: ${{ github.event.inputs.fair_line_only }}
          PREFERRED_BOOK: ${{ github.event.inputs.preferred_book }}
        run: |
          if [ "$FAIR_LINE_ONLY" = "true" ]; then
            python scripts/refresh_2026_warps_market_overlay.py --fair-line-only
          else
            python scripts/refresh_2026_warps_market_overlay.py --fetch-odds-api --preferred-book "$PREFERRED_BOOK"
          fi

      - name: Validate generated overlay
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("site/src/data/warpsMarketOverlay2026.json")
          rows = json.loads(path.read_text())
          if len(rows) != 272:
              raise SystemExit(f"Expected 272 overlay rows, found {len(rows)}")
          print(f"Overlay rows: {len(rows)}")
          print(f"Priced rows: {sum(1 for row in rows if row.get('status') == 'priced')}")
          PY

      - name: Commit refreshed overlay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historical/warps_2026_market_overlay.csv site/src/data/warpsMarketOverlay2026.json
          test -f data/current_odds_api.json && git add data/current_odds_api.json
          test -f data/historical/current_market_odds.csv && git add data/historical/current_market_odds.csv
          if git diff --cached --quiet; then
            echo "No overlay changes to commit."
            exit 0
          fi
          git commit -m "Refresh WARPS market overlay"
          git pull --rebase origin main
          git push origin main
