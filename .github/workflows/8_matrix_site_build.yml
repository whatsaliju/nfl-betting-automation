name: 8 NFL Edge Hub Site Build

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "site/**"
      - "data/historical/matrix_engine_feed.json"
      - "data/historical/warps_2026_market_overlay.csv"
      - "site/src/data/warpsMarketOverlay2026.json"
      - "site/src/data/survivorRecommendations2026.json"
      - "data/historical/pick_explanations.json"
      - ".github/workflows/8_matrix_site_build.yml"
  pull_request:
    paths:
      - "site/**"
      - "data/historical/matrix_engine_feed.json"
      - "data/historical/warps_2026_market_overlay.csv"
      - "site/src/data/warpsMarketOverlay2026.json"
      - "site/src/data/survivorRecommendations2026.json"
      - "data/historical/pick_explanations.json"
      - ".github/workflows/8_matrix_site_build.yml"
  workflow_dispatch:
    inputs:
      engine_feed_url:
        description: "Optional engine feed URL override"
        required: false
        type: string

jobs:
  build-nfl-edge-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          VITE_ENGINE_FEED_URL: ${{ github.event.inputs.engine_feed_url }}
        run: npm run build

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfl-edge-hub-dist
          path: site/dist
          if-no-files-found: error
