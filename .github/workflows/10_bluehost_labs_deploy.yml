name: 10 Deploy NFL Edge Hub to Bluehost

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/10_bluehost_labs_deploy.yml"
      - "data/historical/matrix_engine_feed.json"
      - "site/**"
  workflow_dispatch:
    inputs:
      engine_feed_url:
        description: "Optional engine feed URL override"
        required: false
        type: string
      target_dir:
        description: "Optional Bluehost target directory override"
        required: false
        type: string

jobs:
  deploy-nfl-edge-hub:
    runs-on: ubuntu-latest
    env:
      BLUEHOST_PORT_VALUE: ${{ secrets.BLUEHOST_PORT || '22' }}
      BLUEHOST_TARGET_VALUE: ${{ github.event.inputs.target_dir || secrets.BLUEHOST_TARGET_DIR }}
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          VITE_ENGINE_FEED_URL: ${{ github.event.inputs.engine_feed_url }}
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.BLUEHOST_SSH_KEY }}" | sed 's/\\n/\n/g' > ~/.ssh/bluehost_deploy_key
          printf '\n' >> ~/.ssh/bluehost_deploy_key
          chmod 600 ~/.ssh/bluehost_deploy_key
          ssh-keygen -y -f ~/.ssh/bluehost_deploy_key > /dev/null
          ssh-keyscan -p "$BLUEHOST_PORT_VALUE" "${{ secrets.BLUEHOST_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          SSH_OPTS="-i ~/.ssh/bluehost_deploy_key -p $BLUEHOST_PORT_VALUE -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa"
          ssh $SSH_OPTS "${{ secrets.BLUEHOST_USER }}@${{ secrets.BLUEHOST_HOST }}" "printf 'Bluehost SSH connection ready\n'"

      - name: Create remote target directory
        run: |
          test -n "$BLUEHOST_TARGET_VALUE"
          SSH_OPTS="-i ~/.ssh/bluehost_deploy_key -p $BLUEHOST_PORT_VALUE -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa"
          ssh $SSH_OPTS "${{ secrets.BLUEHOST_USER }}@${{ secrets.BLUEHOST_HOST }}" "mkdir -p '$BLUEHOST_TARGET_VALUE'"

      - name: Upload static site
        run: |
          test -n "$BLUEHOST_TARGET_VALUE"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/bluehost_deploy_key -p $BLUEHOST_PORT_VALUE -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa" \
            dist/ \
            "${{ secrets.BLUEHOST_USER }}@${{ secrets.BLUEHOST_HOST }}:$BLUEHOST_TARGET_VALUE/"
