name: 0 Engine Contracts

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  validate-engine-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pandas numpy requests

      - name: Compile engine scripts
        run: |
          python -m py_compile \
            analyzers/nfl_common.py \
            analyzers/nfl_pro_analyzer.py \
            analyzers/nflverse_referee_trends.py \
            scripts/replay_2025_engine.py \
            scripts/compare_replay_to_results.py \
            scripts/audit_recommendation_traces.py \
            scripts/calibrate_selector_thresholds.py \
            scripts/walk_forward_selector_validation.py \
            scripts/generate_model_readiness_report.py \
            scripts/audit_expectation_edges.py \
            scripts/audit_game_features.py \
            scripts/audit_moneyline_pricing.py \
            scripts/audit_source_reliability.py \
            scripts/audit_warps_selector_alignment.py \
            scripts/build_market_edge_ledger.py \
            scripts/audit_closing_line_value.py \
            scripts/generate_backtest_coverage_report.py \
            scripts/build_pick_explanations.py \
            scripts/build_model_training_dataset.py \
            scripts/evaluate_factor_promotion.py \
            scripts/simulate_promotion_overlays.py \
            scripts/generate_feature_research_report.py \
            scripts/simulate_feature_policies.py \
            scripts/validate_engine_contracts.py \
            graders/grade_week_results.py \
            builders/build_week_master_table.py \
            builders/build_matrix_engine_feed.py \
            builders/build_game_feature_table.py

      - name: Validate engine contracts
        run: python scripts/validate_engine_contracts.py
